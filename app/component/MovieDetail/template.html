<div class="moviedetail">
    <div class="moviedetail__img">
        <img class="moviedetail__img-img" src="{{img}}">
    </div>
    <div class="moviedetail__info">
        <h3 class="moviedetail__info-name">{{title}}</h3>
        <p class="moviedetail__info-description">{{description}}</p>
        <p class="moviedetail__info-director">{{director}}</p>
        <p class="moviedetail__info-year">{{year}}</p>
        <p class="moviedetail__info-category">{{category}}</p>
        <p class="moviedetail__info-min_age">{{min-age}}</p>
        <iframe src="{{url}}"></iframe>
    </div>
</div>
