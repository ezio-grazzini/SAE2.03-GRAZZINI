<div class="menuform">
    <h4 class="menuform__title">Ajouter un film</h4>
    <form class="menuform__form">
        <input required type="text" name="titre" title="titre du film">
        <input required type="text" name="réalisateur" title="Réalisateur du film">
        <input required type="date" name="année" title="Année de sortie du film">
        <input required type="number" name="durée" title="durée (minute)">
        <input required type="text" name="description" title="Description ou Synopsis">

        <select name="category">
            <option value="Action">Action</option>
            <option value="Comédie">Comédie</option>
            <option value="Drame">Drame</option>
            <option value="Science-fiction">Science-fiction</option>
            <option value="Animation">Animation</option>
            <option value="Thriller">Thriller</option>
            <option value="Horreur">Horreur</option>
            <option value="Aventure">Fantaisie</option>
            <option value="Documentaire">Documentaire</option>
        </select>

        <input required type="text" name="url" title="URL du trailer">
        <input required type="text" name="restriction_age" title="URL du trailer">

    </form>
</div>
