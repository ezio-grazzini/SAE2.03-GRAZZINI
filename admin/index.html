<!DOCTYPE html>
<html lang="fr">

<head>
  <title>SAE2.03 ADMIN</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./css/base.css" />
</head>

<body>
  <section id="log"></section>
  <section id="content"></section>

  <script type="module">
    import { Log } from "./component/Log/script.js";
    import { MovieForm } from "./component/MovieForm/script.js"

    import { DataMovie } from "./data/dataMovie.js"


    window.C = {};
    C.start = async function () {
      V.renderLog("Démarrage de l'application");
      let categories = await C.getCategories()
      V.renderMovieForm("C.handlerAddMovie()", categories)
    };

    C.getCategories = async function (){
      let data = await DataMovie.requestCategories();
      return data;
    }


    C.handlerAddMovie = async function () {
      let form = document.querySelector('.movieform__form');
      if (!form.reportValidity()){
        return;
      }
      let fd = new FormData(form);
      let res = await DataMovie.add(fd);
      V.renderLog(res);
    }

    window.V = {};

    V.renderLog = function (txt) {
      let content = document.querySelector("#log");
      content.innerHTML = Log.format(txt);
    };

    V.renderMovieForm = function (handler, categories) {
      let content = document.querySelector("#content");
      content.innerHTML = MovieForm.format(handler, categories)
    }

    C.start();
  </script>
</body>

</html>
